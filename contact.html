<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡我們 | Callidux Limited</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; }
        .input-field { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .input-field:focus { border-color: #6366f1; background: rgba(30, 41, 59, 0.8); outline: none; box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }
        .contact-card { background: linear-gradient(145deg, rgba(30, 41, 59, 0.4), rgba(15, 23, 42, 0.4)); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body x-data="{ lang: 'zh' }">

    <nav class="p-6 border-b border-slate-800 flex justify-between items-center max-w-7xl mx-auto">
        <div class="text-2xl font-black">CALLIDUX<span class="text-indigo-500">.</span></div>
        <div class="space-x-6 text-sm flex items-center">
            <a href="index.html" class="hover:text-indigo-400 transition">首頁</a>
            <a href="portfolio.html" class="hover:text-indigo-400 transition">專案矩陣</a>
            <a href="contact.html" class="text-indigo-400 font-bold">聯絡我們</a>
            <button @click="lang = lang === 'zh' ? 'en' : 'zh'" class="bg-slate-800 px-3 py-1 rounded text-[10px] font-bold">EN/繁</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-20 grid lg:grid-cols-2 gap-16">
        
        <div class="space-y-12">
            <div>
                <h1 class="text-5xl font-black mb-6 tracking-tighter" x-text="lang === 'zh' ? '開始對話' : 'Start a Conversation'"></h1>
                <p class="text-slate-400 text-lg leading-relaxed" x-text="lang === 'zh' ? '無論您是有一個初步的構想，還是需要具體的技術實施方案，我們的專業團隊隨時準備為您服務。' : 'Whether you have a preliminary concept or need a specific technical implementation, our expert team is ready to help.'"></p>
            </div>

            <div class="space-y-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-indigo-500/10 flex items-center justify-center text-indigo-400 text-xl">📧</div>
                    <div>
                        <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">Email Us</p>
                        <p class="text-lg font-bold">info@callidux.com</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-emerald-500/10 flex items-center justify-center text-emerald-400 text-xl">🌐</div>
                    <div>
                        <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">Location</p>
                        <p class="text-lg font-bold" x-text="lang === 'zh' ? '香港 · 數碼港 / 科學園' : 'Hong Kong · Cyberport / Science Park'"></p>
                    </div>
                </div>
            </div>

            <div class="pt-8 border-t border-slate-900 flex gap-4 opacity-50 text-[10px] font-bold uppercase tracking-widest">
                <span>#PropTech</span>
                <span>#HealthTech</span>
                <span>#Mobility</span>
                <span>#AI_Lab</span>
            </div>
        </div>

        <div class="contact-card p-10 rounded-[3rem] shadow-2xl">
            <form action="https://formspree.io/f/your_formspree_id" method="POST" class="space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">姓名 Name</label>
                        <input type="text" name="name" required class="input-field w-full p-4 rounded-2xl text-white">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">電郵 Email</label>
                        <input type="email" name="_replyto" required class="input-field w-full p-4 rounded-2xl text-white">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">感興趣的領域 Interest</label>
                    <select name="category" class="input-field w-full p-4 rounded-2xl text-white appearance-none">
                        <option value="PropTech">PropTech AI (SmartLink)</option>
                        <option value="HealthTech">Digital Health & Smart Hardware</option>
                        <option value="Mobility">Smart Mobility & CV</option>
                        <option value="Other">其他諮詢 Other Inquiry</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">訊息內容 Message</label>
                    <textarea name="message" rows="5" required class="input-field w-full p-4 rounded-2xl text-white"></textarea>
                </div>

                <input type="hidden" name="_subject" value="New Inquiry from Callidux Website">

                <button type="submit" class="w-full bg-indigo-600 py-5 rounded-2xl font-black text-lg hover:bg-indigo-500 transition shadow-xl shadow-indigo-600/20">
                    <span x-text="lang === 'zh' ? '發送訊息' : 'Send Message'"></span>
                </button>
            </form>
        </div>
    </main>

    <footer class="py-12 text-center text-slate-700 text-[10px] tracking-widest uppercase">
        © 2026 Callidux Limited. Excellence in Execution.
    </footer>

</body>
</html>
