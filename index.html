<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Callidux Limited | 將構想轉化為 AI 現實</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; scroll-behavior: smooth; }
        .gradient-text { background: linear-gradient(90deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-glass { background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .hero-glow { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 100%; height: 800px; background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, rgba(2,6,23,0) 70%); z-index: -1; }
        .team-image-container { position: relative; border-radius: 3rem; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    </style>
</head>
<body x-data="{ lang: 'zh' }">

    <div class="hero-glow"></div>

    <nav class="nav-glass sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black tracking-tighter text-white">CALLIDUX<span class="text-indigo-500">.</span></div>
            <div class="hidden md:flex space-x-8 text-sm font-medium items-center text-slate-300">
                <a href="index.html" class="text-white font-bold">首頁</a>
                <a href="portfolio.html" class="hover:text-indigo-400 transition" x-text="lang === 'zh' ? '專案矩陣' : 'Portfolio'"></a>
                <a href="services.html" class="hover:text-indigo-400 transition" x-text="lang === 'zh' ? '服務範疇' : 'Services'"></a>
                <a href="technology.html" class="hover:text-indigo-400 transition" x-text="lang === 'zh' ? '技術實力' : 'Technology'"></a>
            </div>
            <div class="flex items-center gap-4">
                <button @click="lang = lang === 'zh' ? 'en' : 'zh'" class="text-[10px] font-bold border border-slate-700 px-2 py-1 rounded hover:bg-slate-800 transition">EN/繁</button>
                <a href="#contact" class="bg-indigo-600 px-5 py-2 rounded-full text-xs font-bold hover:bg-indigo-500 transition">Contact</a>
            </div>
        </div>
    </nav>

    <section class="pt-24 pb-16 px-6 text-center max-w-6xl mx-auto">
        <h1 class="text-5xl md:text-7xl font-black mb-8 leading-tight tracking-tighter">
            <span x-show="lang === 'zh'">將您的構想 <br><span class="gradient-text">轉化為 AI 現實</span></span>
            <span x-show="lang === 'en'">Turning Concepts <br><span class="gradient-text">Into AI Reality</span></span>
        </h1>
        <p class="text-slate-400 text-lg md:text-xl mb-12 max-w-3xl mx-auto leading-relaxed" x-text="lang === 'zh' ? 'Callidux Limited 是一家具備軟硬體研發實力的 AI 工作室。從 PropTech、Digital Health 到智慧交通，我們以跨領域技術為客戶實踐創新。' : 'Callidux Limited is an AI studio with full-stack hardware and software capabilities. From PropTech to Digital Health and Mobility, we turn visions into practice.'"></p>
        
        <div class="team-image-container max-w-4xl mx-auto mb-20">
            <img src="team-professional.jpg" alt="Callidux Professional Team" class="w-full h-auto">
            <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-transparent to-transparent"></div>
            <div class="absolute bottom-8 left-0 right-0">
                <p class="text-indigo-400 font-bold tracking-[0.2em] text-xs uppercase" x-text="lang === 'zh' ? '專業團隊 · 全域實踐' : 'Professional Team · Full-Loop Execution'"></p>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-center gap-6">
            <a href="portfolio.html" class="bg-white text-black px-12 py-4 rounded-full font-bold hover:bg-slate-200 transition">瀏覽我們的作品集</a>
            <a href="#contact.html" class="border border-slate-700 px-12 py-4 rounded-full font-bold hover:bg-slate-800 transition">立即聯繫團隊</a>
        </div>
    </section>

    <section class="py-24 px-6 bg-slate-900/20 border-y border-slate-900">
        <div class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-8 text-center opacity-70">
            <div><div class="text-2xl mb-2">🏠</div><p class="text-[10px] font-bold tracking-widest uppercase">PropTech</p></div>
            <div><div class="text-2xl mb-2">🩺</div><p class="text-[10px] font-bold tracking-widest uppercase">HealthTech</p></div>
            <div><div class="text-2xl mb-2">🚗</div><p class="text-[10px] font-bold tracking-widest uppercase">AutoTech</p></div>
            <div><div class="text-2xl mb-2">🔌</div><p class="text-[10px] font-bold tracking-widest uppercase">Smart IoT</p></div>
        </div>
    </section>

    <footer class="py-12 text-center text-slate-700 text-xs">
        <p>© 2026 Callidux Limited. Transforming concepts into intelligent reality.</p>
    </footer>

</body>
</html>
